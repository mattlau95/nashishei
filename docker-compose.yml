services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: nashishei
      POSTGRES_PASSWORD: nashishei
      POSTGRES_DB: nashishei
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nashishei"]
      interval: 5s
      timeout: 5s
      retries: 5

  ml:
    build: ./ml
    ports:
      - "8000:8000"
    environment:
      - ENV=development

volumes:
  db_data:
