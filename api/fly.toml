app = 'api-black-silence-6888'
primary_region = 'ewr'

[build]

[env]
  PORT = "8080"
  STORAGE_PATH = "/storage"
  ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[mounts]]
  source = "nashishei_storage"
  destination = "/storage"
  initial_size = "1gb"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
